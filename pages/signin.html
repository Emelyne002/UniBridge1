<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - UniBridge</title>
    <link rel="stylesheet" href="../styles/signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <nav>
        <a href="homepage.html"><i class="fas fa-home"></i> Home</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a>
        <a href="student-dashboard.html"><i class="fas fa-user-graduate"></i> Student</a>
        <a href="lecturer-dashboard.html"><i class="fas fa-chalkboard-teacher"></i> Lecturer</a>
        <div class="dropdown">
        <a href="admin-dashboard.html" class="dropbtn"><i class="fas fa-user-shield"></i> Admin <i class="fas fa-chevron-down" style="font-size:12px;margin-left:5px;"></i></a>
        <div class="dropdown-content">
            <a href="admin-dashboard.html?role=principal"><i class="fas fa-crown"></i> Principal</a>
            <a href="admin-dashboard.html?role=registrar"><i class="fas fa-address-book"></i> Registrar</a>
            <a href="admin-dashboard.html?role=dean"><i class="fas fa-graduation-cap"></i> Dean</a>
            <a href="admin-dashboard.html?role=hod"><i class="fas fa-users"></i> Head of Department</a>
            <a href="admin-dashboard.html?role=secretary"><i class="fas fa-clipboard-list"></i> Secretary</a>
        </div>
    </div>
        <a href="signin.html" class="active-nav signin-btn"><i class="fas fa-sign-in-alt"></i> Sign In</a>
    </nav>

    <div class="container">
        <h1 style="text-align: center; margin-bottom: 30px;">Sign In to UniBridge</h1>

        <div class="signin-form">
            <form action="#" method="post" id="signin-form" onsubmit="return handleSignIn(event)">
                <fieldset>
                    <legend>Login Credentials</legend>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@university.edu" autocomplete="on" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="8">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>User Role</legend>

                    <div class="form-group">
                        <label for="role">Select Your Role</label>
                        <select id="role" name="role" required>
                            <option value="">-- Select a role --</option>
                            <option value="student">Student</option>
                            <option value="lecturer">Lecturer</option>
                            <optgroup label="Administrator">
                                <option value="principal">Principal</option>
                                <option value="registrar">Registrar</option>
                                <option value="secretary">Secretary</option>
                                <option value="dean">Dean</option>
                                <option value="hod">Head of Department</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember" name="remember">
                            <span>Remember me</span>
                        </label>
                    </div>
                </fieldset>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-signin">Sign In</button>
                    <button type="reset" class="btn btn-reset">Clear</button>
                </div>

                <p class="login-link">Don't have an account? <a href="Register.html">Register here</a></p>
                <p class="login-link"><a href="#">Forgot your password?</a></p>
            </form>
        </div>
    </div>

    <footer>
        <p>UniBridge &copy; 2026 | Connecting Universities</p>
    </footer>

    <script>
        function handleSignIn(event) {
            event.preventDefault();
            var role = document.getElementById('role').value;
            if (!role) { alert('Please select your role.'); return false; }
            var dashboards = {
                'student': 'student-dashboard.html',
                'lecturer': 'lecturer-dashboard.html',
                'principal': 'admin-dashboard.html',
                'registrar': 'admin-dashboard.html',
                'secretary': 'admin-dashboard.html',
                'dean': 'admin-dashboard.html',
                'hod': 'admin-dashboard.html'
            };
            if (dashboards[role]) { window.location.href = dashboards[role]; }
            return false;
        }
    </script>
</body>
</html>
