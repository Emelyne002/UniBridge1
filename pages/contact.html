<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - UniBridge</title>
    <link rel="stylesheet" href="../styles/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="contact.html" class="active-nav"><i class="fas fa-envelope"></i> Contact Us</a>
        <a href="student-dashboard.html"><i class="fas fa-user-graduate"></i> Student</a>
        <a href="lecturer-dashboard.html"><i class="fas fa-chalkboard-teacher"></i> Lecturer</a>
        <div class="dropdown">
        <a href="admin-dashboard.html" class="dropbtn"><i class="fas fa-user-shield"></i> Admin <i class="fas fa-chevron-down" style="font-size:12px;margin-left:5px;"></i></a>
        <div class="dropdown-content">
            <a href="admin-dashboard.html?role=principal"><i class="fas fa-crown"></i> Principal</a>
            <a href="admin-dashboard.html?role=registrar"><i class="fas fa-address-book"></i> Registrar</a>
            <a href="admin-dashboard.html?role=dean"><i class="fas fa-graduation-cap"></i> Dean</a>
            <a href="admin-dashboard.html?role=hod"><i class="fas fa-users"></i> Head of Department</a>
            <a href="admin-dashboard.html?role=secretary"><i class="fas fa-clipboard-list"></i> Secretary</a>
        </div>
    </div>
        <a href="signin.html" class="signin-btn"><i class="fas fa-sign-in-alt"></i> Sign In</a>
    </nav>

    <div class="container">
        <h1 style="color: rgb(250, 249, 249); text-shadow: 5px 5px 0px rgb(165, 162, 162); text-align: center;">Contact Us</h1>

        <div class="contact-form">
            <form>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Your Name" autocomplete="on" required autofocus>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@university.edu" autocomplete="on" required autofocus>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="What is this about?" autocomplete="on" required autofocus>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="6" placeholder="Tell us how we can help..."  autofocus></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
        <div class="home">
            <p><a href="index.html">back to home</a></p>
        </div>  
    </div>
    <footer>
        <p>UniBridge &copy; 2026 | Connecting Universities</p>
    </footer>
</body>
</html>
