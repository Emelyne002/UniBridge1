<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UniBridge</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <nav>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a>
        <a href="student-dashboard.html"><i class="fas fa-user-graduate"></i> Student</a>
        <a href="lecturer-dashboard.html"><i class="fas fa-chalkboard-teacher"></i> Lecturer</a>
        <div class="dropdown">
        <a href="admin-dashboard.html" class="dropbtn"><i class="fas fa-user-shield"></i> Admin <i class="fas fa-chevron-down" style="font-size:12px;margin-left:5px;"></i></a>
        <div class="dropdown-content">
            <a href="admin-dashboard.html?role=principal"><i class="fas fa-crown"></i> Principal</a>
            <a href="admin-dashboard.html?role=registrar"><i class="fas fa-address-book"></i> Registrar</a>
            <a href="admin-dashboard.html?role=dean"><i class="fas fa-graduation-cap"></i> Dean</a>
            <a href="admin-dashboard.html?role=hod"><i class="fas fa-users"></i> Head of Department</a>
            <a href="admin-dashboard.html?role=secretary"><i class="fas fa-clipboard-list"></i> Secretary</a>
        </div>
    </div>
        <a href="signin.html" class="signin-btn"><i class="fas fa-sign-in-alt"></i> Sign In</a>
    </nav>

    <div class="container1">
        <h1 style="text-align: center; margin-bottom: 30px;">Create Your Account</h1>

        <div class="register-form">
            <form action="#" method="post">
                <fieldset>
                    <legend>Personal Information</legend>

                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" name="firstname" placeholder="Enter your first name" autocomplete="on" required>
                    </div>

                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" name="lastname" placeholder="Enter your last name" autocomplete="on" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@university.edu" autocomplete="on" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+250 700 000 000" autocomplete="on">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>University Details</legend>

                    <div class="form-group">
                        <label for="university">University</label>
                        <input type="text" id="university" name="university" placeholder="Enter your university name" autocomplete="on" required>
                    </div>

                    <div class="form-group">
                        <label for="campus">Campus</label>
                        <input type="text" id="campus" name="campus" placeholder="Enter your campus name" autocomplete="on">
                    </div>

                    <div class="form-group">
                        <label for="category">Select Category</label>
                        <select id="category" name="category" required>
                            <option value="">Select a category</option>
                            <option value="student">Student</option>
                            <option value="lecturer">Lecturer</option>
                            <optgroup label="Administrator">
                                <option value="principal">Principal</option>
                                <option value="registrar">Registrar</option>
                                <option value="secretary">Secretary</option>
                                <option value="dean">Dean</option>
                                <option value="hod">Head of Department</option>
                            </optgroup>
                        </select>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Account Security</legend>

                    <div class="form-group">
                        <label for="password">Create Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter a strong password" required minlength="8">
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required minlength="8">
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" name="terms" required>
                            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                        </label>
                    </div>
                </fieldset>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-register">Create Account</button>
                    <button type="reset" class="btn btn-reset">Reset</button>
                </div>

                <p class="login-link">Already have an account? <a href="signin.html">Sign in here</a></p>
            </form>
        </div>
    </div>

    <footer>
        <p>UniBridge &copy; 2026 | Connecting Universities</p>
    </footer>
</body>
</html>
